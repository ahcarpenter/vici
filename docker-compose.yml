services:
  postgres:
    image: postgres:16
    env_file: .env.postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vici"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  opensearch:
    image: opensearchproject/opensearch:2.19.4
    env_file: .env.opensearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "9200:9200"

  jaeger-collector:
    image: jaegertracing/jaeger:2.16.0
    command: --config /etc/jaeger/collector-config.yaml
    volumes:
      - ./jaeger/collector-config.yaml:/etc/jaeger/collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:13133/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger-query:
    image: jaegertracing/jaeger:2.16.0
    command: --config /etc/jaeger/query-config.yaml
    env_file: .env.jaeger-query
    volumes:
      - ./jaeger/query-config.yaml:/etc/jaeger/query-config.yaml
    ports:
      - "16686:16686"
    depends_on:
      opensearch:
        condition: service_healthy
      jaeger-collector:
        condition: service_started

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      jaeger-collector:
        condition: service_started
      temporal:
        condition: service_healthy
    env_file: .env.app
    volumes:
      - ./src:/app/src
    ports:
      - "8000:8000"
    command: >
      sh -c "uv run alembic upgrade head && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  temporal:
    image: temporalio/auto-setup:1.26.2
    env_file: .env.temporal
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:latest
    env_file: .env.temporal-ui
    ports:
      - "8080:8080"
    depends_on:
      - temporal

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.4.0
    env_file: .env.grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  grafana_data:
