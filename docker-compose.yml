services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vici"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  opensearch:
    image: opensearchproject/opensearch:2.19.4
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "9200:9200"

  jaeger-collector:
    image: jaegertracing/jaeger:2.16.0
    command: --config /etc/jaeger/collector-config.yaml
    volumes:
      - ./jaeger/collector-config.yaml:/etc/jaeger/collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:13133/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger-query:
    image: jaegertracing/jaeger:2.16.0
    command: --config /etc/jaeger/query-config.yaml
    volumes:
      - ./jaeger/query-config.yaml:/etc/jaeger/query-config.yaml
    ports:
      - "16686:16686"
    depends_on:
      opensearch:
        condition: service_healthy
      jaeger-collector:
        condition: service_started

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      jaeger-collector:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vici:vici@postgres:5432/vici
      INNGEST_DEV: "1"
      INNGEST_BASE_URL: http://inngest:8288
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger-collector:4317
      WEBHOOK_BASE_URL: http://localhost:8000
      GIT_SHA: ${GIT_SHA:-dev}
    volumes:
      - ./src:/app/src
    ports:
      - "8000:8000"
    command: >
      sh -c "uv run alembic upgrade head && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  inngest:
    image: inngest/inngest:latest
    command: "inngest dev -u http://app:8000/api/inngest"
    ports:
      - "8288:8288"
    depends_on:
      - app
