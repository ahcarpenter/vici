services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: vici
      POSTGRES_USER: vici
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vici"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vici:vici@postgres:5432/vici
      INNGEST_DEV: "1"
      INNGEST_BASE_URL: http://inngest:8288
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      WEBHOOK_BASE_URL: http://localhost:8000
    ports:
      - "8000:8000"
    command: >
      sh -c "uv run alembic upgrade head && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  inngest:
    image: inngest/inngest:latest
    command: "inngest dev -u http://app:8000/api/inngest"
    ports:
      - "8288:8288"
    depends_on:
      - app
