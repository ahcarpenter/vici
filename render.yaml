services:
  - type: web
    name: vici
    runtime: docker
    dockerfilePath: ./Dockerfile
    preDeployCommand: "uv run alembic upgrade head"
    healthCheckPath: /health
    plan: starter
    region: oregon
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vici-db
          property: connectionString
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_HOST
        sync: false
      - key: BRAINTRUST_API_KEY
        sync: false
      - key: INNGEST_SIGNING_KEY
        sync: false
      - key: INNGEST_EVENT_KEY
        sync: false
      - key: INNGEST_DEV
        value: "0"
      - key: INNGEST_BASE_URL
        value: "https://inn.gs"
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: ENV
        value: production
      - key: GIT_SHA
        generateValue: false
        value: ""

databases:
  - name: vici-db
    plan: basic-256mb
    postgresMajorVersion: "16"
    databaseName: vici
    user: vici
