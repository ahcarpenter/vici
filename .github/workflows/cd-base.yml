name: CD Base

"on":
  workflow_call:
    inputs:
      stack:
        required: true
        type: string
      command:
        required: true
        type: string
      environment:
        required: false
        type: string
      gcp_project:
        required: true
        type: string
    secrets:
      WIF_PROVIDER:
        required: true
      WIF_SERVICE_ACCOUNT:
        required: true
      PULUMI_CONFIG_PASSPHRASE:
        required: true
    outputs:
      sha:
        description: "7-char git SHA used as image tag"
        value: ${{ jobs.build.outputs.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    # WR-01 fix: attach the approval gate to build so the image push
    # itself waits on the environment's required reviewers. Without
    # this, anyone with workflow_dispatch permission could push
    # arbitrary bytes to the prod Artifact Registry before any human
    # reviews. Empty string (dev/staging) means no gate; 'prod' binds
    # to the GitHub `prod` Environment.
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: sha
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - uses: docker/build-push-action@v6
        if: inputs.command == 'up'
        with:
          context: .
          push: true
          tags: us-central1-docker.pkg.dev/${{ inputs.gcp_project }}/vici-images/vici:${{ steps.sha.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # The Pulumi Kubernetes provider in infra/ reads a kubeconfig whose auth
      # stanza uses the gke-gcloud-auth-plugin exec provider. Ubuntu runners
      # ship with gcloud but not this plugin component, so we install it here.
      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Pulumi dependencies
        run: cd infra && uv sync --frozen

      - uses: pulumi/actions@v6
        with:
          command: ${{ inputs.command }}
          stack-name: ${{ inputs.stack }}
          work-dir: infra
          cloud-url: gs://vici-app-pulumi-state-${{ inputs.stack }}
          config-map: '{"vici-infra:imageTag": {"value": "${{ needs.build.outputs.sha }}", "secret": false}}'
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      # WR-03 fix: extend budget from 60s to 180s (cover image pull +
      # rolling update + readiness initial delay) and log pod status
      # + recent logs on failure so triage doesn't require ssh-to-gke.
      # Uses gke-gcloud-auth-plugin installed via setup-gcloud above.
      - name: Health check
        if: inputs.stack == 'dev' && inputs.command == 'up'
        run: |
          for i in $(seq 1 36); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dev.usevici.com/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 180s — dumping triage data"
          gcloud container clusters get-credentials vici-${{ inputs.stack }} \
            --region us-central1 --project ${{ inputs.gcp_project }} || true
          echo "--- deployment describe ---"
          kubectl -n vici describe deployment vici-app || true
          echo "--- pods ---"
          kubectl -n vici get pods -l app=vici-app -o wide || true
          echo "--- recent app logs ---"
          kubectl -n vici logs -l app=vici-app --tail=100 --all-containers || true
          exit 1
