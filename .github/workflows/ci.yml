name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src/ tests/
        continue-on-error: true # TODO: circle back to ensure formatting is further normalized

      - name: Test
        run: uv run pytest tests/ -x --tb=short -q
        env:
          # Use SQLite for CI (no postgres dependency -- matches existing test conftest pattern)
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          INNGEST_DEV: "1"
          INNGEST_BASE_URL: http://localhost:8288
          TWILIO_AUTH_TOKEN: test_token
          TWILIO_ACCOUNT_SID: test_sid
          TWILIO_FROM_NUMBER: "+15005550006"
          WEBHOOK_BASE_URL: http://localhost:8000
          OPENAI_API_KEY: test_key
          PINECONE_API_KEY: test_key
          PINECONE_INDEX_HOST: test_host
          BRAINTRUST_API_KEY: test_key
