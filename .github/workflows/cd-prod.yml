name: CD Prod

"on":
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# WR-02 fix: serialize prod deploys per stack. cancel-in-progress is
# false because an approved prod deploy must never be silently
# cancelled mid-apply by a follow-up dispatch.
concurrency:
  group: cd-prod
  cancel-in-progress: false

jobs:
  deploy-prod:
    uses: ./.github/workflows/cd-base.yml
    with:
      stack: prod
      command: up
      environment: prod
      gcp_project: vici-app-prod
    secrets:
      WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_CI_SA_EMAIL }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
