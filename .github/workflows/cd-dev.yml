name: CD Dev

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy-dev:
    uses: ./.github/workflows/cd-base.yml
    with:
      stack: dev
      command: up
    secrets:
      WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_CI_SA_DEV }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
