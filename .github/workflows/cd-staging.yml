name: CD Staging

"on":
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# WR-02 fix: serialize staging deploys per stack. cancel-in-progress
# is false here because a staging deploy is manually dispatched and
# should never be silently cancelled mid-apply by a follow-up click.
concurrency:
  group: cd-staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    uses: ./.github/workflows/cd-base.yml
    with:
      stack: staging
      command: up
      gcp_project: vici-app-staging
    secrets:
      WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_CI_SA_EMAIL }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
