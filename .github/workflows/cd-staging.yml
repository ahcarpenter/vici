name: CD Staging

"on":
  workflow_dispatch:

# IN-01 revisited: top-level permissions ARE required on callers of a
# reusable workflow that needs elevated scopes. Without this block
# cd-base.yml cannot claim id-token: write for WIF auth (see commit
# 7835bcd + CD Dev startup_failure run 24291482351).
permissions:
  contents: read
  id-token: write

# WR-02 fix: serialize staging deploys per stack. cancel-in-progress
# is false here because a staging deploy is manually dispatched and
# should never be silently cancelled mid-apply by a follow-up click.
concurrency:
  group: cd-staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    uses: ./.github/workflows/cd-base.yml
    with:
      stack: staging
      command: up
      gcp_project: vici-app-staging
    secrets:
      WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_CI_SA_EMAIL }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
